{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Liste des Formations</h2>

<a href="{% url 'formation_add' %}" class="btn btn-success">
Ajouter formation
</a>

</div>

<div class="card shadow">

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>Titre</th>
<th>Durée</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for formation in formations %}

<tr>

<td>{{ formation.titre }}</td>

<td>
<span class="badge bg-info">
{{ formation.duree }} heures
</span>
</td>

<td>

<a href="{% url 'formation_edit' formation.id %}" class="btn btn-warning btn-sm">
Modifier
</a>

<a href="{% url 'formation_delete' formation.id %}" class="btn btn-danger btn-sm">
Supprimer
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center">
Aucune formation disponible
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

{% endblock %}
