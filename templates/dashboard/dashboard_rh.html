<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Dashboard RH</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f1f5f9;
    font-family: 'Segoe UI', sans-serif;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    height:100%;
    width:230px;
    background:#111827;
    padding-top:20px;
}

.sidebar h3{
    color:white;
    text-align:center;
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    padding:12px 25px;
    color:#cbd5e1;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:#2563eb;
    color:white;
}

/* TOPBAR */

.topbar{
    margin-left:230px;
    height:70px;
    background:white;
    display:flex;
    align-items:center;
    padding-left:30px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* MAIN */

.main{
    margin-left:230px;
    padding:40px;
}

/* CARDS */

.card-stat{
    border:none;
    border-radius:12px;
    padding:25px;
    background:white;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
    transition:0.3s;
}

.card-stat:hover{
    transform:translateY(-6px);
}

.stat-number{
    font-size:35px;
    font-weight:bold;
}

.blue{border-left:6px solid #3b82f6;}
.green{border-left:6px solid #22c55e;}
.orange{border-left:6px solid #f59e0b;}
.red{border-left:6px solid #ef4444;}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>RH Admin</h3>

<a href="#">🏠 Dashboard</a>
<a href="{% url 'formation_list' %}">📚 Formations</a>
<a href="{% url 'session_list' %}">📅 Sessions</a>
<a href="{% url 'inscription_list' %}">📝 Inscriptions</a>
<a href="{% url 'employe_list' %}">👥 Employés</a>

<hr style="border-color:#374151">

<a href="/">🚪 Déconnexion</a>

</div>


<!-- TOPBAR -->

<div class="topbar">
<h4>Dashboard RH</h4>
</div>


<!-- MAIN CONTENT -->

<div class="main">

<div class="row g-4">

<div class="col-md-3">
<div class="card-stat blue">
<h6>Formations</h6>
<div class="stat-number">{{ formations }}</div>
</div>
</div>

<div class="col-md-3">
<div class="card-stat green">
<h6>Sessions</h6>
<div class="stat-number">{{ sessions }}</div>
</div>
</div>

<div class="col-md-3">
<div class="card-stat orange">
<h6>Employés</h6>
<div class="stat-number">{{ employes }}</div>
</div>
</div>

<div class="col-md-3">
<div class="card-stat red">
<h6>Inscriptions</h6>
<div class="stat-number">{{ inscriptions }}</div>
</div>
</div>

</div>

</div>

</body>
</html>
