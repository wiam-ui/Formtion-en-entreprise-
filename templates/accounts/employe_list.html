{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Liste des Employés</h2>
    <a href="{% url 'employe_add' %}" class="btn btn-success">Ajouter employé</a>
</div>

<div class="card shadow">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for employe in employes %}
                    <tr>
                        <td>{{ employe.username }}</td>
                        <td>{{ employe.email }}</td>
                        <td>
                            <a href="{% url 'employe_edit' employe.id %}" class="btn btn-warning btn-sm">Modifier</a>
                            <a href="{% url 'employe_delete' employe.id %}" class="btn btn-danger btn-sm">Supprimer</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">Aucun employé disponible</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
